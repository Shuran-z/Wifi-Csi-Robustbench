protocol_version: 1
frozen_before_corrupted_eval: true
bank_name: deep_model_bank_v1
train_seeds: [42, 123, 2026]
datasets: [UT_HAR, NTU_Fi_HAR]
input_shape_default: [1, 250, 90]
families:
  MLP:
    small: {hidden: [128, 64], dropout: 0.10}
    medium: {hidden: [256, 128], dropout: 0.20}
    large: {hidden: [512, 256, 128], dropout: 0.30}
  CNN:
    small: {channels: [16, 32], blocks: 2}
    medium: {channels: [32, 64, 96], blocks: 3}
    large: {channels: [32, 64, 128, 192], blocks: 4}
  GRU:
    small: {hidden_size: 64, num_layers: 1, dropout: 0.0}
    medium: {hidden_size: 128, num_layers: 1, dropout: 0.0}
    large: {hidden_size: 192, num_layers: 2, dropout: 0.2}
  LSTM:
    small: {hidden_size: 64, num_layers: 1, dropout: 0.0}
    medium: {hidden_size: 128, num_layers: 1, dropout: 0.0}
    large: {hidden_size: 192, num_layers: 2, dropout: 0.2}
  CNN-GRU:
    small: {channels: [16, 32], hidden_size: 64}
    medium: {channels: [16, 32, 64], hidden_size: 96}
    large: {channels: [32, 64, 96], hidden_size: 160}
  Transformer:
    small: {dim: 64, depth: 1, heads: 2, patch_size: [10, 10]}
    medium: {dim: 128, depth: 2, heads: 4, patch_size: [10, 10]}
    large: {dim: 192, depth: 3, heads: 6, patch_size: [10, 10]}
training:
  epochs: 30
  batch_size: 128
  lr: 0.001
  weight_decay: 0.0001
  val_fraction: 0.15
  patience: 8
  use_amp: true
expected_configurations_per_dataset: 18
expected_runs_per_dataset: 54
